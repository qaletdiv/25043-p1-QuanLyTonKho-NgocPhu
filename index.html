<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMP store</title>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./js/mock-data.js"></script>
</head>

<body>
    <div id="global-header"></div>
    <div class="dashboard">
        <div id="global-sidebar"></div>
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h2>Quản lý đơn mua hàng và tồn kho</h2>
                </div>
                <div class="user-menu">
                    <button class="user-avatar" id="userAvatar">
                        👤
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <p class="dropdown-item userName"></p>
                        <button class="dropdown-item logout-item">
                            Logout
                        </button>
                    </div>
                </div>
            </header>
            <section class="filter-section">
                <div class="filter-group">
                    <input type="text" id="search-order" placeholder="tìm đơn hàng">
                    <button class="search-btn" id="search-btn">Tìm kiếm</button>
                </div>
                <button class="create-btn">Tạo mới</button>
            </section>
            <h3 class="table-title">Danh sách đơn mua hàng</h3>
            <section class="table-section">
                <table>
                    <thead>
                        <tr>
                            <th>Mã đơn</th>
                            <th>Nhà cung cấp</th>
                            <th>Ngày mua</th>
                            <th>Nhân viên</th>
                            <th>Tổng tiền</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody id="purchase-order-list">
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td>
                                <span class="status">
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <div id="global-footer"></div>
    <script src="./js/main.js"></script>
    <script type="module" src="./index.js"></script>
</body>

</html>
