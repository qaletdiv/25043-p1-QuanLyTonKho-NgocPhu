<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMP store</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./js/main.js"></script>
    <script type="module" src="./js/mock-data.js"></script>
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="brand">
                    <img src="./assets/images/logo.png" alt="logo" class="logo">
                    <h2>SMP Store</h2>
                </div>
                <nav class="nav-links">
                    <a href="/index.html" class="nav-item"> Đơn mua hàng</a>
                    <a href="/index.html" class="nav-item"> Đơn bán hàng</a>
                    <a href="#" class="nav-item"> Sản phẩm </a>
                    <a href="#" class="nav-item"> Nhà cung cấp </a>
                    <a href="#" class="nav-item"> Tồn kho</a>
                    <a href="./profile/profilepage.html" class="nav-item"> Profile</a>
                </nav>
            </div>
        </aside>
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h1>Danh sách Đơn mua hàng</h1>
                    <p>Quản lý đơn mua hàng và tồn kho </p>
                </div>
                <div class="user-box">
                    <div class="user-info">
                        <span class="user-name"></span>
                        <span class="user-role"></span>
                    </div>
                    <button class="logout-btn">Logout </button>
                </div>
            </header>
            <section class="filter-section">
                <div class="filter-group">
                    <input type="text" id="search-order-id" placeholder="Mã đơn hàng">
                    <input type="text" id="search-order-supplier" placeholder="Tên nhà cung cấp">
                    <button class="search-btn" id="search-btn">Tìm kiếm</button>
                </div>
                <button class="create-btn">Tạo mới</button>
            </section>
            <section class="table-section">
                <table>
                    <thead>
                        <tr>
                            <th>Mã đơn</th>
                            <th>Nhà cung cấp</th>
                            <th>Ngày mua</th>
                            <th>Nhân viên</th>
                            <th>Tổng tiền</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody id="purchase-order-list">
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td>
                                <span class="status">
                                </span>
                            </td>
                        </tr>
                    </tbody>
                    <script>
                        const orders = JSON.parse(localStorage.getItem("ImportOrders")) || [];
                        const suppliers = JSON.parse(localStorage.getItem("Suppliers")) || [];
                        const searchBtn = document.getElementById("search-btn");
                        const tbody = document.getElementById("purchase-order-list");
                        
                        function renderOrders(orderList) {
                            tbody.innerHTML = "";
                            if (orderList.length === 0) {
                                tbody.innerHTML = `
                                <tr>
                                    <td colspan="6">Không tìm thấy đơn hàng</td>
                                </tr>`;
                                return;
                            }
                            orderList.forEach(order => {
                                const supplier = suppliers.find(s => s.id === order.supplierId);
                                tbody.innerHTML += `<tr>
                                <td>${order.Id}</td>
                                <td>
                                    ${supplier ? supplier.name : "Không rõ"}
                                </td>
                                <td>${order.create_at}</td>
                                <td>${order.create_by}</td>
                                <td>
                                    ${order.cost.toLocaleString("vi-VN")}đ
                                </td>
                                <td>
                                    <span class="status">
                                        ${order.status}
                                    </span>
                                </td>
                            </tr>`;
                        });
                        }
                        renderOrders(orders);
                        searchBtn.addEventListener("click", () => {
                            const getID = document.getElementById("search-order-id").value
                                .trim()
                                .toLowerCase();
                            const getSup = document.getElementById("search-order-supplier").value
                                .trim()
                                .toLowerCase();
                            const filteredOrders = orders.filter(order => {
                                //khi filter chạy sẽ duyệt từng orders [.., supplierId] => cần dòng này để tìm supplier
                                const supplier = suppliers.find(
                                    s => s.id === order.supplierId
                                );
                                const matchId = order.Id.toLowerCase().includes(getID);
                                const matchSupplier = supplier? supplier.name.toLowerCase().includes(getSup): false;
                                return matchId && matchSupplier;
                            });
                            renderOrders(filteredOrders);
                        });
                    </script>
                </table>
            </section>
        </main>
    </div>
    <script type="module" src="./index.js"></script>
</body>

</html>
