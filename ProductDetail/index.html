<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div id="global-header"></div>
    <div class="dashboard">
        <div id="global-sidebar"></div>
        <main class="main-content">
            <header class="page-header">
                <h1>Thông tin sản phẩm</h1>
                <p>Tạo mới hoặc chỉnh sửa sản phẩm</p>
            </header>
            <section class="form-card">
                <div class="form-grid">
                    
                    <div class="form-group">
                        <label>
                            Tên sản phẩm
                            <span class="required">*</span>
                        </label>
                        <input type="text" id="product-name" required>
                    </div>

                    <div class="form-group">
                        <label>
                            Nhà cung cấp
                            <span class="required">*</span>
                        </label>
                        <select id="product-supplier" >
                            <option value="" required>-- Chọn nhà cung cấp --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>
                            Đơn vị tính
                            <span class="required">*</span>
                        </label>
                        <input type="text" id="product-unit" required>
                    </div>
                    <div class="form-group">
                        <label>Đơn giá</label>
                        <input type="number" id="product-price">
                    </div>
                </div>
                <div class="form-actions">
                    <button class="save-btn" id="save-btn">
                        Lưu
                    </button>
                    <button class="cancel-btn" id="cancel-btn">
                        Hủy
                    </button>
                </div>
            </section>
        </main>
    </div>

    <div id="global-footer"></div>
    <script src="../js/main.js"></script>
    <script type="module" src="./pdetail.js"></script>
</body>

</html>
