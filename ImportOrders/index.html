<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn Mua Hàng</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-top">
                <a class="logohr" href="../index.html">
                    <div class="brand">
                        <img src="../assets/images/logo.png" alt="logo" class="logo">
                        <h2>SMP Store</h2>
                    </div>
                </a>
                <nav class="nav-links">
                    <a href="./" class="nav-item active">
                        Đơn mua hàng
                    </a>
                    <a href="../index.html" class="nav-item">
                        Đơn bán hàng
                    </a>
                    <a href="#" class="nav-item">
                        Sản phẩm
                    </a>
                    <a href="#" class="nav-item">
                        Nhà cung cấp
                    </a>
                    <a href="#" class="nav-item">
                        Tồn kho
                    </a>
                    <a href="#" class="nav-item">
                        Profile
                    </a>
                </nav>
            </div>
        </aside>
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h1>Đơn Mua Hàng</h1>
                    <p>Quản lý thông tin và sản phẩm của đơn hàng</p>
                </div>
                <div class="user-box">
                    <div class="user-info">
                        <span class="user-name">Admin</span>
                    </div>
                    <button class="logout-btn">
                        Logout
                    </button>
                </div>
            </header>
            <div class="purchase-page">
                <section class="card">
                    <div class="card-header">
                        <h2>Thông tin chung</h2>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nhà cung cấp</label required>
                            <select>
                                <option value="">
                                    Chọn nhà cung cấp
                                </option>
                                <option>
                                    Samsung VN
                                </option>
                                <option>
                                    Apple VN
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Nhân viên phụ trách</label>
                            <input type="text" placeholder="Nhập tên nhân viên" required>
                        </div>

                        <div class="form-group">
                            <label>Ngày mua hàng</label>
                            <input type="date" required>
                        </div>

                        <div class="form-group full-width">
                            <label>Ghi chú</label>
                            <textarea placeholder="Nhập ghi chú..."></textarea>
                        </div>
                    </div>
                </section>

                <div class="product-layout">
                    <section class="card product-card">
                        <div class="card-header product-header">
                            <h2>Danh sách sản phẩm</h2>
                            <button class="add-product-btn">
                                Thêm sản phẩm
                            </button>
                        </div>

                        <div class="table-wrapper">
                            <table class="product-table">
                                <thead>
                                    <tr>
                                        <th>Mã sản phẩm</th>
                                        <th>Tên sản phẩm</th>
                                        <th>Số lượng</th>
                                        <th>Đơn giá</th>
                                        <th>Thành tiền</th>
                                        <th>Hành động</th>
                                    </tr>
                                </thead>
                                <tbody id="product-table-body">
                                    <tr>
                                        <td>
                                            <select>
                                                <option>SP001</option>
                                            </select>
                                        </td>
                                        <td class="product-name">
                                            Dell XPS 15
                                        </td>
                                        <td>
                                            <input type="number" value="1" min="1">
                                        </td>
                                        <td>
                                            <input type="number" value="25000000">
                                        </td>
                                        <td class="total-price">
                                            25,000,000đ
                                        </td>
                                        <td>
                                            <button class="delete-btn">
                                                Xóa
                                            </button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </section>

                    <aside class="checkout-sidebar">
                        <div class="summary-card">
                            <span>Tổng tiền đơn hàng</span>
                            <h2>25,000,000đ</h2>
                        </div>
                        <div class="action-card">
                            <button class="draft-btn">
                                Lưu lại
                            </button>
                            <button class="confirm-btn">
                                Xác nhận đơn hàng
                            </button>
                            <button class="import-btn">
                                Xác nhận nhập kho
                            </button>
                            <button class="secondary-btn">
                                Quay lại danh sách
                            </button>
                        </div>
                    </aside>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
