<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn Mua Hàng</title>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="../js/mock-data.js"></script>
</head>

<body>
    <div id="global-header"></div>
    <div class="dashboard">
        <div id="global-sidebar"></div>
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h1>Đơn Mua Hàng</h1>
                    <p>Quản lý thông tin và sản phẩm của đơn hàng</p>
                </div>
                <div class="user-menu">
                    <button class="user-avatar" id="userAvatar">
                        👤
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <p class="dropdown-item userName"></p>
                        <button class="dropdown-item logout-item">
                            Logout
                        </button>
                    </div>
                </div>
            </header>
            <div class="purchase-page">
                <section class="card">
                    <div class="card-header">
                        <h2>Thông tin chung</h2>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nhà cung cấp</label required>
                            <select id="Supplier-options">
                                <option value="">
                                    Chọn nhà cung cấp
                                </option>
                                <option>
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Nhân viên phụ trách</label>
                            <input class="employee" type="text" placeholder="Nhập tên nhân viên" required>
                        </div>

                        <div class="form-group">
                            <label>Ngày mua hàng</label>
                            <input class="date-input" type="date" required>
                        </div>

                        <div class="form-group full-width">
                            <label>Ghi chú</label>
                            <textarea class="note-input" placeholder="Nhập ghi chú..."></textarea>
                        </div>
                    </div>
                </section>

                <div class="product-layout">
                    <section class="card product-card">
                        <div class="card-header product-header">
                            <h2>Danh sách sản phẩm</h2>
                            <button class="add-product-btn">
                                Thêm sản phẩm
                            </button>
                        </div>

                        <div class="table-wrapper">
                            <table class="product-table">
                                <thead>
                                    <tr>
                                        <th>Mã sản phẩm</th>
                                        <th>Tên sản phẩm</th>
                                        <th>Số lượng</th>
                                        <th>Đơn giá</th>
                                        <th>Thành tiền</th>
                                        <th>Hành động</th>
                                    </tr>
                                </thead>
                                <tbody id="product-table-body">
                                    <tr>
                                        
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </section>

                    <aside class="checkout-sidebar">
                        <div class="summary-card">
                            <span>Tổng tiền đơn hàng</span>
                            <h2 id="total-price">0đ</h2>
                        </div>
                        <div class="action-card">
                            <button class="draft-btn">
                                Lưu lại
                            </button>
                            <button class="confirm-btn">
                                Xác nhận đơn hàng
                            </button>
                            <button class="import-btn">
                                Xác nhận nhập kho
                            </button>
                            <button class="secondary-btn">
                                Quay lại danh sách
                            </button>
                        </div>
                    </aside>
                </div>
            </div>
        </main>
    </div>
    <div id="global-footer"></div>
    <script type="module" src="./index.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
