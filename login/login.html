<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login_container">
        <div class="img_panel" id="imgpanel">
            <div class="img_decoration"></div>
        </div>

        <div class="input_panel">
            <img src="" alt="">

            <div class="form-container">
                <div class="input-form" id="inputform">
                    <div class="header-text">
                        <h2>SMP Store</h2>
                    </div>
                    <form id="login-form-element">
                        <div class="form-log">
                            <input type="email" required id="Email" placeholder="Email">
                        </div>
                        <div class="form-log">
                            <input type="password" required id="Password" placeholder="Password">
                        </div>
                        <div class="button-log">
                            <button type="submit" class="btn btn-login">Login</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
